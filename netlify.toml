[build]
  publish = "."

# Redirect /window-wraps to the rancho page (configure per site)
# For Rancho site:
# [[redirects]]
#   from = "/window-wraps"
#   to = "/rancho/index.html"
#   status = 200

# For Irvine site:
# [[redirects]]
#   from = "/window-wraps"
#   to = "/irvine/index.html"
#   status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
