[build]
  command = "npx @11ty/eleventy"
  publish = "_site"

# Host-based redirects: serve the correct landing page for each custom domain
[[redirects]]
  from = "/"
  to = "/rancho/"
  status = 200
  conditions = {Host = "go.alphagraphicsrancho.com"}

[[redirects]]
  from = "/"
  to = "/irvine/"
  status = 200
  conditions = {Host = "go.alphagraphicsirvine.com"}

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
